<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Scoreboard</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface2: #f0f2f5;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
      --live: #1a7f37;
      --final: #656d76;
      --preview: #9a6700;
      --radius: 10px;
    }

    :root.dark {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #1f6feb;
      --live: #3fb950;
      --final: #7d8590;
      --preview: #d29922;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span { color: var(--accent); }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .date-nav button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    .date-nav button:hover { background: var(--border); }

    #date-display {
      font-size: 15px;
      font-weight: 600;
      min-width: 140px;
      text-align: center;
    }

    .refresh-info {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.5s infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .summary-bar span strong { color: var(--text); }

    #games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    /* ── Game cards ── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .game-card.live   { border-left: 3px solid var(--live); }
    .game-card.final  { border-left: 3px solid var(--final); }
    .game-card.preview{ border-left: 3px solid var(--preview); }

    .card-header {
      padding: 10px 14px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.live    { background: rgba(63,185,80,.15);  color: var(--live); }
    .status-badge.final   { background: rgba(125,133,144,.15);color: var(--muted); }
    .status-badge.preview { background: rgba(210,153,34,.15); color: var(--preview); }

    .venue-name { font-size: 11px; color: var(--muted); }

    .matchup {
      padding: 8px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .team-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .team-info { flex: 1; min-width: 0; }

    .team-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-name.winner { color: var(--text); }
    .team-name.loser  { color: var(--muted); }

    .team-record { font-size: 11px; color: var(--muted); }

    .score {
      font-size: 22px;
      font-weight: 700;
      min-width: 28px;
      text-align: right;
      line-height: 1;
    }

    .score.winner { color: var(--text); }
    .score.loser  { color: var(--muted); }

    .card-footer {
      padding: 8px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .pitchers { display: flex; flex-direction: column; gap: 2px; }
    .pitcher  { font-size: 11px; color: var(--muted); }
    .pitcher strong { color: var(--text); font-weight: 500; }

    /* Count dots */
    .count-bar { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); }
    .count-item { display: flex; gap: 3px; align-items: center; }
    .count-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .count-dot.active { background: #f0c040; }
    .count-dot.strike { background: #e05252; }
    .count-dot.out    { background: #e05252; }

    /* ── Loading / error ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--muted);
      font-size: 16px;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { text-align: center; padding: 60px; color: var(--muted); }
    .no-games  { text-align: center; padding: 60px; color: var(--muted); font-size: 16px; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      overflow-y: auto;
      padding: 24px 16px;
    }

    #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      overflow: hidden;
      position: relative;
    }

    #modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #modal-close:hover { background: var(--border); }

    #modal-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .modal-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .modal-team {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .modal-team.home { flex-direction: row-reverse; text-align: right; }

    .modal-team-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .modal-team-logo img { width: 40px; height: 40px; object-fit: contain; }

    .modal-team-name { font-size: 17px; font-weight: 700; }
    .modal-team-record { font-size: 12px; color: var(--muted); }
    .modal-team-name.loser { color: var(--muted); }

    .modal-score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .modal-scores {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-score {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      min-width: 40px;
      text-align: center;
    }

    .modal-score.loser { color: var(--muted); }
    .modal-dash { font-size: 24px; color: var(--muted); }

    .modal-status {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-status.live    { color: var(--live); }
    .modal-status.final   { color: var(--muted); }
    .modal-status.preview { color: var(--preview); }

    /* Linescore inside modal */
    .modal-linescore {
      overflow-x: auto;
      margin-top: 10px;
    }

    .ls-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 380px;
    }

    .ls-table th {
      color: var(--muted);
      font-weight: 500;
      padding: 4px 6px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .ls-table td {
      padding: 5px 6px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .ls-table td:first-child { text-align: left; font-weight: 600; padding-left: 0; }
    .ls-table .totals { border-left: 2px solid var(--border); font-weight: 700; }
    .ls-table .cur    { background: rgba(31,111,235,.15); color: var(--accent); }

    /* Box score sections */
    #modal-body { padding: 0 20px 20px; }

    .bs-section { margin-top: 20px; }

    .bs-team-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bs-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: auto;
    }

    .bs-table-wrap { overflow-x: auto; }

    .bs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 440px;
    }

    .bs-table thead tr {
      border-bottom: 1px solid var(--border);
    }

    .bs-table th {
      color: var(--muted);
      font-weight: 500;
      padding: 4px 8px;
      text-align: right;
      white-space: nowrap;
    }

    .bs-table th:first-child { text-align: left; }

    .bs-table td {
      padding: 5px 8px;
      text-align: right;
      border-bottom: 1px solid rgba(48,54,61,.5);
      white-space: nowrap;
    }

    .bs-table td:first-child { text-align: left; color: var(--text); }

    .bs-table tbody tr:last-child td { border-bottom: none; }

    .bs-table .totals-row td {
      border-top: 1px solid var(--border);
      border-bottom: none;
      font-weight: 700;
      color: var(--text);
    }

    .bs-table .note { color: var(--muted); font-size: 11px; }
    .bs-table .decision { color: var(--preview); font-size: 11px; font-weight: 600; }

    .bs-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0 0;
    }

    .game-info-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-info-item {
      font-size: 11px;
      color: var(--muted);
    }

    .game-info-item strong { color: var(--text); }

    .modal-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 12px;
      color: var(--muted);
    }

    .modal-error { text-align: center; padding: 40px; color: var(--muted); }

    /* ── Batter link ── */
    .batter-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 2px;
      background: none;
      border: none;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
    }
    .batter-link:hover { text-decoration-style: solid; }

    /* ── Player view overlay ── */
    #player-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 300;
      overflow-y: auto;
      padding: 24px 16px;
    }
    #player-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    #player-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      overflow: hidden;
      position: relative;
    }

    .player-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .player-back-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .player-back-btn:hover { background: var(--border); }

    .player-name-title {
      font-size: 18px;
      font-weight: 700;
    }

    .player-meta {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .player-body { padding: 20px; }

    .pitch-zone-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .pitch-zone-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .pitch-zone-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pitch-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      max-width: 220px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .at-bat-list { flex: 1; min-width: 260px; }

    .at-bat-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface2);
    }

    .at-bat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .at-bat-result {
      font-weight: 700;
      font-size: 13px;
    }
    .at-bat-result.positive { color: var(--live); }
    .at-bat-result.negative { color: #e05252; }
    .at-bat-result.neutral  { color: var(--text); }

    .at-bat-context { font-size: 11px; color: var(--muted); }

    .at-bat-pitches {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .pitch-chip {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      cursor: default;
    }
    .pitch-chip.ball   { background: rgba(31,111,235,.15); color: var(--accent); }
    .pitch-chip.strike { background: rgba(224,82,82,.15);  color: #e05252; }
    .pitch-chip.inplay { background: rgba(63,185,80,.15);  color: var(--live); }

    @media (max-width: 600px) {
      header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      #games-grid { grid-template-columns: 1fr; }
      #modal-overlay { padding: 0; align-items: flex-start; }
      #modal { border-radius: 0; min-height: 100vh; }
      #player-overlay { padding: 0; align-items: flex-start; }
      #player-modal { border-radius: 0; min-height: 100vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚾ <span>MLB</span> Scoreboard</div>
  <div class="date-nav">
    <button id="prev-day">&#8592;</button>
    <div id="date-display">Loading…</div>
    <button id="next-day">&#8594;</button>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="refresh-info" id="refresh-info"></div>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode"
      style="background:var(--surface2);border:1px solid var(--border);color:var(--text);
             padding:5px 10px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1">
    </button>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary-bar"></div>
  <div id="games-grid"><div class="loading"><div class="spinner"></div> Loading games…</div></div>
</main>

<!-- Box Score Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modal-header"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Player At-Bat View -->
<div id="player-overlay">
  <div id="player-modal">
    <div id="player-content"></div>
  </div>
</div>

<script>
  const BASE = 'https://statsapi.mlb.com';
  const LOGO = id => `https://www.mlb.com/assets/images/teams/cap-logos/team-cap-on-dark/${id}.svg`;

  let currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  let refreshTimer = null;
  let hasLiveGames = false;
  let scheduleCache = {};  // gamePk -> game object for modal use
  let currentGamePk = null;

  const PITCH_COLORS = {
    FF: '#e05252', SI: '#e07838', FC: '#e09c20', SL: '#9b5de5',
    CU: '#2080e0', KC: '#20b8e0', CH: '#27ae60', FS: '#1abc9c',
    KN: '#c0a020', EP: '#888888', FO: '#1abc9c', ST: '#9b5de5',
    SV: '#9b5de5',
  };
  const PITCH_SHORT = {
    FF: '4-Seam', SI: 'Sinker', FC: 'Cutter', SL: 'Slider', CU: 'Curve',
    KC: 'KC', CH: 'Change', FS: 'Split', KN: 'Knuckle', EP: 'Eephus',
    FO: 'Fork', ST: 'Sweeper', SV: 'Slurve',
  };

  // ── Utilities ──────────────────────────────────────────────

  function toDateStr(d) {
    return d.toISOString().slice(0,10);
  }

  function formatDisplayDate(dateStr) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
    const tomorrow  = new Date(today); tomorrow.setDate(today.getDate()+1);
    if (dt.getTime() === today.getTime())     return 'Today';
    if (dt.getTime() === yesterday.getTime()) return 'Yesterday';
    if (dt.getTime() === tomorrow.getTime())  return 'Tomorrow';
    return dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  }

  function formatGameTime(isoStr) {
    return new Date(isoStr).toLocaleTimeString('en-US',
      {hour:'numeric', minute:'2-digit', timeZoneName:'short'});
  }

  function getStatusClass(game) {
    const s = game.status.abstractGameState;
    return s === 'Live' ? 'live' : s === 'Final' ? 'final' : 'preview';
  }

  function getStatusLabel(game) {
    const s = game.status;
    if (s.abstractGameState === 'Live') {
      const ls = game.linescore;
      return ls ? `${ls.inningState} ${ls.currentInningOrdinal}` : 'Live';
    }
    if (s.abstractGameState === 'Final') {
      const ls = game.linescore;
      if (ls && ls.currentInning && ls.currentInning !== ls.scheduledInnings)
        return `Final/${ls.currentInning}`;
      return 'Final';
    }
    return s.startTimeTBD ? 'TBD' : formatGameTime(game.gameDate);
  }

  function renderCount(game) {
    const ls = game.linescore;
    if (!ls || game.status.abstractGameState !== 'Live') return '';
    const balls   = ls.balls   ?? 0;
    const strikes = ls.strikes ?? 0;
    const outs    = ls.outs    ?? 0;
    const bd = [0,1,2,3].map(i => `<span class="count-dot${i<balls?' active':''}"></span>`).join('');
    const sd = [0,1].map(i    => `<span class="count-dot${i<strikes?' strike':''}"></span>`).join('');
    const od = [0,1,2].map(i  => `<span class="count-dot${i<outs?' out':''}"></span>`).join('');
    return `<div class="count-bar">
      <span class="count-item">${bd}</span><span style="color:var(--muted);font-size:10px">B</span>
      <span class="count-item">${sd}</span><span style="color:var(--muted);font-size:10px">S</span>
      <span class="count-item">${od}</span><span style="color:var(--muted);font-size:10px">O</span>
    </div>`;
  }

  // ── Game cards ─────────────────────────────────────────────

  function renderGame(game) {
    const away = game.teams.away;
    const home = game.teams.home;
    const sc   = getStatusClass(game);
    const sl   = getStatusLabel(game);
    const isStarted = game.status.abstractGameState !== 'Preview';
    const isFinal   = game.status.abstractGameState === 'Final';
    const isLive    = game.status.abstractGameState === 'Live';

    const awayWin = isFinal && away.isWinner;
    const homeWin = isFinal && home.isWinner;
    const awayScore = isStarted ? (away.score ?? 0) : '';
    const homeScore = isStarted ? (home.score ?? 0) : '';
    const awayRec = `${away.leagueRecord?.wins??0}-${away.leagueRecord?.losses??0}`;
    const homeRec = `${home.leagueRecord?.wins??0}-${home.leagueRecord?.losses??0}`;

    const awayPitcher = away.probablePitcher?.fullName;
    const homePitcher = home.probablePitcher?.fullName;

    const hint = isStarted
      ? '<span style="font-size:11px;color:var(--muted)">Box score ▶</span>'
      : '';

    return `
      <div class="game-card ${sc}" onclick="openBoxScore(${game.gamePk})" data-pk="${game.gamePk}">
        <div class="card-header">
          <span class="status-badge ${sc}">${sl}</span>
          <span class="venue-name">${game.venue.name}</span>
        </div>

        <div class="matchup">
          <div class="team-row">
            <div class="team-logo">
              <img src="${LOGO(away.team.id)}" alt="${away.team.abbreviation}"
                   onerror="this.style.display='none';this.parentNode.textContent='${away.team.abbreviation}'">
            </div>
            <div class="team-info">
              <div class="team-name ${awayWin?'winner':isFinal?'loser':''}">${away.team.name}</div>
              <div class="team-record">${awayRec}</div>
            </div>
            <div class="score ${awayWin?'winner':isFinal?'loser':''}">${awayScore}</div>
          </div>

          <div class="team-row">
            <div class="team-logo">
              <img src="${LOGO(home.team.id)}" alt="${home.team.abbreviation}"
                   onerror="this.style.display='none';this.parentNode.textContent='${home.team.abbreviation}'">
            </div>
            <div class="team-info">
              <div class="team-name ${homeWin?'winner':isFinal?'loser':''}">${home.team.name}</div>
              <div class="team-record">${homeRec}</div>
            </div>
            <div class="score ${homeWin?'winner':isFinal?'loser':''}">${homeScore}</div>
          </div>
        </div>

        ${isLive ? `<div style="padding:0 14px 8px">${renderCount(game)}</div>` : ''}

        <div class="card-footer">
          <div class="pitchers">
            ${awayPitcher ? `<div class="pitcher"><strong>${away.team.abbreviation}:</strong> ${awayPitcher}</div>` : ''}
            ${homePitcher ? `<div class="pitcher"><strong>${home.team.abbreviation}:</strong> ${homePitcher}</div>` : ''}
          </div>
          ${hint}
        </div>
      </div>`;
  }

  // ── Box Score Modal ────────────────────────────────────────

  async function openBoxScore(gamePk) {
    const overlay = document.getElementById('modal-overlay');
    const header  = document.getElementById('modal-header');
    const body    = document.getElementById('modal-body');

    currentGamePk = gamePk;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    const game = scheduleCache[gamePk];
    if (game) renderModalHeader(header, game);
    else header.innerHTML = '';

    body.innerHTML = `<div class="modal-loading"><div class="spinner"></div> Loading box score…</div>`;

    try {
      const res = await fetch(`${BASE}/api/v1/game/${gamePk}/boxscore`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const bs = await res.json();

      // Also get linescore from cached schedule data if available
      const lsGame = scheduleCache[gamePk];

      if (game) renderModalHeader(header, game);
      body.innerHTML = renderBoxScore(bs, lsGame, gamePk);
    } catch (err) {
      body.innerHTML = `<div class="modal-error">Failed to load box score.<br><small>${err.message}</small></div>`;
    }
  }

  function renderModalHeader(container, game) {
    const away = game.teams.away;
    const home = game.teams.home;
    const sc = getStatusClass(game);
    const sl = getStatusLabel(game);
    const isFinal   = game.status.abstractGameState === 'Final';
    const isStarted = game.status.abstractGameState !== 'Preview';

    const awayWin = isFinal && away.isWinner;
    const homeWin = isFinal && home.isWinner;
    const awayScore = isStarted ? (away.score ?? 0) : '-';
    const homeScore = isStarted ? (home.score ?? 0) : '-';
    const awayRec = `${away.leagueRecord?.wins??0}-${away.leagueRecord?.losses??0}`;
    const homeRec = `${home.leagueRecord?.wins??0}-${home.leagueRecord?.losses??0}`;

    const ls = game.linescore;
    const linescore = ls && ls.innings && ls.innings.length
      ? renderModalLinescore(game) : '';

    container.innerHTML = `
      <div class="modal-teams">
        <div class="modal-team away">
          <div class="modal-team-logo">
            <img src="${LOGO(away.team.id)}" alt="${away.team.abbreviation}"
                 onerror="this.style.display='none';this.parentNode.textContent='${away.team.abbreviation}'">
          </div>
          <div>
            <div class="modal-team-name ${awayWin?'':'loser'}">${away.team.name}</div>
            <div class="modal-team-record">${awayRec} · Away</div>
          </div>
        </div>

        <div class="modal-score-block">
          <div class="modal-scores">
            <span class="modal-score ${awayWin?'':'loser'}">${awayScore}</span>
            <span class="modal-dash">–</span>
            <span class="modal-score ${homeWin?'':'loser'}">${homeScore}</span>
          </div>
          <div class="modal-status ${sc}">${sl}</div>
          ${game.description ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${game.description}</div>` : ''}
        </div>

        <div class="modal-team home">
          <div class="modal-team-logo">
            <img src="${LOGO(home.team.id)}" alt="${home.team.abbreviation}"
                 onerror="this.style.display='none';this.parentNode.textContent='${home.team.abbreviation}'">
          </div>
          <div>
            <div class="modal-team-name ${homeWin?'':'loser'}">${home.team.name}</div>
            <div class="modal-team-record">${homeRec} · Home</div>
          </div>
        </div>
      </div>
      ${linescore}`;
  }

  function renderModalLinescore(game) {
    const ls      = game.linescore;
    const innings = ls.innings;
    const isLive  = game.status.abstractGameState === 'Live';
    const isFinal = game.status.abstractGameState === 'Final';

    const awayAbbr = game.teams.away.team.abbreviation;
    const homeAbbr = game.teams.home.team.abbreviation;
    const awayR = ls.teams?.away?.runs   ?? game.teams.away.score ?? '-';
    const awayH = ls.teams?.away?.hits   ?? '-';
    const awayE = ls.teams?.away?.errors ?? '-';
    const homeR = ls.teams?.home?.runs   ?? game.teams.home.score ?? '-';
    const homeH = ls.teams?.home?.hits   ?? '-';
    const homeE = ls.teams?.home?.errors ?? '-';

    const headers = innings.map(i => `<th>${i.num}</th>`).join('');

    const awayRow = innings.map(i => {
      const cur = isLive && i.num === ls.currentInning && ls.isTopInning;
      return `<td class="${cur?'cur':''}">${i.away?.runs ?? ''}</td>`;
    }).join('');

    const homeRow = innings.map(i => {
      const cur = isLive && i.num === ls.currentInning && !ls.isTopInning;
      let val = i.home?.runs;
      if (val === undefined) val = (isFinal && i.num === ls.currentInning) ? 'X' : '';
      return `<td class="${cur?'cur':''}">${val}</td>`;
    }).join('');

    return `
      <div class="modal-linescore">
        <table class="ls-table">
          <thead><tr><th></th>${headers}<th class="totals">R</th><th class="totals">H</th><th class="totals">E</th></tr></thead>
          <tbody>
            <tr><td>${awayAbbr}</td>${awayRow}<td class="totals">${awayR}</td><td class="totals">${awayH}</td><td class="totals">${awayE}</td></tr>
            <tr><td>${homeAbbr}</td>${homeRow}<td class="totals">${homeR}</td><td class="totals">${homeH}</td><td class="totals">${homeE}</td></tr>
          </tbody>
        </table>
      </div>`;
  }

  function renderBoxScore(bs, game, gamePk) {
    const state = game?.status?.abstractGameState;
    if (state === 'Preview') {
      return `<div style="padding:30px 20px;text-align:center;color:var(--muted)">
        Game has not started yet. Check back for the box score.
      </div>`;
    }

    const awayBatting  = renderBatting(bs.teams.away,  gamePk);
    const awayPitching = renderPitching(bs.teams.away, 'Pitching');
    const homeBatting  = renderBatting(bs.teams.home,  gamePk);
    const homePitching = renderPitching(bs.teams.home, 'Pitching');

    const awayName = bs.teams.away.team.name;
    const homeName = bs.teams.home.team.name;

    const infoHtml = renderInfo(bs.info);

    return `
      <div class="bs-section">
        <div class="bs-team-header">${awayName} <span class="bs-label">Away</span></div>
        <div class="bs-table-wrap">${awayBatting}</div>
        <div class="bs-table-wrap" style="margin-top:12px">${awayPitching}</div>
      </div>

      <div class="bs-divider"></div>

      <div class="bs-section">
        <div class="bs-team-header">${homeName} <span class="bs-label">Home</span></div>
        <div class="bs-table-wrap">${homeBatting}</div>
        <div class="bs-table-wrap" style="margin-top:12px">${homePitching}</div>
      </div>

      ${infoHtml}`;
  }

  function renderBatting(teamData, gamePk) {
    const players      = teamData.players;
    const battingOrder = (teamData.battingOrder || []).map(String);

    // Collect batters in order; include subs (battingOrder ends in non-00)
    const batters = battingOrder
      .map(id => players[`ID${id}`])
      .filter(Boolean);

    if (batters.length === 0) return '<p style="color:var(--muted);font-size:12px;padding:4px 0">No batting data</p>';

    const rows = batters.map(p => {
      const b    = p.stats?.batting || {};
      const pos  = p.position?.abbreviation ?? '';
      const name = p.person.boxscoreName ?? p.person.fullName;
      const id   = p.person.id;
      const isSub = p.battingOrder && p.battingOrder % 100 !== 0;
      const indent = isSub ? 'style="padding-left:18px;color:var(--muted)"' : '';
      const escapedName = name.replace(/'/g, "\\'");
      const nameHtml = `<button class="batter-link" onclick="openPlayerView(${id},'${escapedName}',${gamePk})">${name}</button>`;
      return `<tr>
        <td ${indent}>${isSub ? '↳ ' : ''}${nameHtml} <span style="color:var(--muted)">${pos}</span></td>
        <td>${b.atBats     ?? '-'}</td>
        <td>${b.runs       ?? '-'}</td>
        <td>${b.hits       ?? '-'}</td>
        <td>${b.rbi        ?? '-'}</td>
        <td>${b.baseOnBalls?? '-'}</td>
        <td>${b.strikeOuts ?? '-'}</td>
        <td>${b.avg        ?? ''}</td>
      </tr>`;
    }).join('');

    const ts = teamData.teamStats?.batting || {};
    const totalsRow = `<tr class="totals-row">
      <td>Totals</td>
      <td>${ts.atBats     ?? ''}</td>
      <td>${ts.runs       ?? ''}</td>
      <td>${ts.hits       ?? ''}</td>
      <td>${ts.rbi        ?? ''}</td>
      <td>${ts.baseOnBalls?? ''}</td>
      <td>${ts.strikeOuts ?? ''}</td>
      <td></td>
    </tr>`;

    return `<table class="bs-table">
      <thead><tr>
        <th style="text-align:left">Batter</th>
        <th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>AVG</th>
      </tr></thead>
      <tbody>${rows}${totalsRow}</tbody>
    </table>`;
  }

  function renderPitching(teamData, label) {
    const players  = teamData.players;
    const pitcherIds = teamData.pitchers || [];

    if (pitcherIds.length === 0) return '<p style="color:var(--muted);font-size:12px;padding:4px 0">No pitching data</p>';

    const rows = pitcherIds.map(id => {
      const p = players[`ID${id}`];
      if (!p) return '';
      const pit  = p.stats?.pitching || {};
      const name = p.person.boxscoreName ?? p.person.fullName;
      const note = pit.note ?? '';
      const noteHtml = note
        ? `<span class="decision">${note}</span>`
        : '';
      return `<tr>
        <td>${name} ${noteHtml}</td>
        <td>${pit.inningsPitched ?? '-'}</td>
        <td>${pit.hits           ?? '-'}</td>
        <td>${pit.runs           ?? '-'}</td>
        <td>${pit.earnedRuns     ?? '-'}</td>
        <td>${pit.baseOnBalls    ?? '-'}</td>
        <td>${pit.strikeOuts     ?? '-'}</td>
        <td>${pit.numberOfPitches ?? '-'}</td>
      </tr>`;
    }).join('');

    const ts = teamData.teamStats?.pitching || {};
    const totalsRow = `<tr class="totals-row">
      <td>Totals</td>
      <td>${ts.inningsPitched ?? ''}</td>
      <td>${ts.hits           ?? ''}</td>
      <td>${ts.runs           ?? ''}</td>
      <td>${ts.earnedRuns     ?? ''}</td>
      <td>${ts.baseOnBalls    ?? ''}</td>
      <td>${ts.strikeOuts     ?? ''}</td>
      <td>${ts.numberOfPitches ?? ''}</td>
    </tr>`;

    return `<table class="bs-table">
      <thead><tr>
        <th style="text-align:left">Pitcher</th>
        <th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>SO</th><th>P</th>
      </tr></thead>
      <tbody>${rows}${totalsRow}</tbody>
    </table>`;
  }

  function renderInfo(infoArr) {
    if (!infoArr || infoArr.length === 0) return '';
    const items = infoArr
      .filter(i => i.label && i.value)
      .map(i => `<div class="game-info-item"><strong>${i.label}:</strong> ${i.value}</div>`)
      .join('');
    return `<div class="bs-divider"></div>
      <div class="bs-section">
        <div class="bs-team-header">Game Notes</div>
        <div class="game-info-list">${items}</div>
      </div>`;
  }

  // ── Player At-Bat View ─────────────────────────────────────

  async function openPlayerView(playerId, playerName, gamePk) {
    const overlay = document.getElementById('player-overlay');
    const content = document.getElementById('player-content');

    content.innerHTML = `
      <div class="player-header">
        <button class="player-back-btn" onclick="closePlayerView()">&#8592; Back to Box Score</button>
        <div class="player-name-title">${playerName}</div>
      </div>
      <div class="player-body">
        <div class="modal-loading"><div class="spinner"></div> Loading pitch data…</div>
      </div>`;
    overlay.classList.add('open');

    try {
      const res = await fetch(`${BASE}/api/v1/game/${gamePk}/playByPlay`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const plays = (data.allPlays || []).filter(
        play => play.matchup?.batter?.id === playerId && play.result?.type === 'atBat'
      );
      content.innerHTML = buildPlayerView(playerName, plays);
    } catch (err) {
      content.innerHTML = `
        <div class="player-header">
          <button class="player-back-btn" onclick="closePlayerView()">&#8592; Back to Box Score</button>
          <div class="player-name-title">${playerName}</div>
        </div>
        <div class="modal-error">Failed to load pitch data.<br><small>${err.message}</small></div>`;
    }
  }

  function buildPlayerView(playerName, plays) {
    const allPitches = [];
    plays.forEach((play, abIdx) => {
      (play.playEvents || []).forEach(ev => {
        if (ev.type === 'pitch') allPitches.push({ ...ev, abIdx });
      });
    });

    if (plays.length === 0) {
      return `
        <div class="player-header">
          <button class="player-back-btn" onclick="closePlayerView()">&#8592; Back to Box Score</button>
          <div class="player-name-title">${playerName}</div>
        </div>
        <div class="player-body" style="text-align:center;color:var(--muted);padding:40px">
          No at-bat data available.
        </div>`;
    }

    // Gather used pitch types for legend
    const usedTypes = {};
    allPitches.forEach(p => {
      const code = p.details?.type?.code;
      if (code) usedTypes[code] = p.details.type.description || PITCH_SHORT[code] || code;
    });
    const legendHtml = Object.entries(usedTypes).map(([code, desc]) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${pitchColor(code)}"></div>
        <span>${PITCH_SHORT[code] || desc}</span>
      </div>`).join('');

    const atBatsHtml = plays.map((play, i) => buildAtBat(play, i + 1)).join('');

    return `
      <div class="player-header">
        <button class="player-back-btn" onclick="closePlayerView()">&#8592; Back to Box Score</button>
        <div class="player-name-title">${playerName}</div>
        <span class="player-meta">${plays.length} AB · ${allPitches.length} pitches</span>
      </div>
      <div class="player-body">
        <div class="pitch-legend" style="margin-bottom:16px">${legendHtml}</div>
        <div class="at-bat-list">${atBatsHtml}</div>
      </div>`;
  }

  function buildBatterSilhouette(pcx, sy0, pw, W, H, batSide) {
    if (!batSide || !BATTER_IMG[batSide]) return '';
    // Scale image height to ~72% of SVG height, preserve 82:218 aspect ratio
    const imgH = Math.round(H * 0.72);
    const imgW = Math.round(imgH * 82 / 218);
    const imgY = sy0 - imgH;
    const isRight = batSide !== 'L';
    const imgX = isRight ? (pcx - pw / 2 - imgW) : (pcx + pw / 2);
    return `<image x="${imgX.toFixed(1)}" y="${imgY.toFixed(1)}" width="${imgW}" height="${imgH}" href="${BATTER_IMG[batSide]}" opacity="0.9"/>`;
  }

  function buildStrikeZone(pitches, W = 220, H = 260, batSide = null) {
    const PAD = W < 180 ? 20 : 28;
    // Plot area in real-world feet
    const pxMin = -1.8, pxMax = 1.8;
    const pzMin = 0.3,  pzMax = 5.2;

    // Strike zone bounds (use first pitch with zone data, else defaults)
    let szTop = 3.5, szBot = 1.5;
    for (const p of pitches) {
      if (p.pitchData?.strikeZoneTop && p.pitchData?.strikeZoneBottom) {
        szTop = p.pitchData.strikeZoneTop;
        szBot = p.pitchData.strikeZoneBottom;
        break;
      }
    }
    const szLeft = -0.708, szRight = 0.708;

    function sx(px) { return PAD + ((px - pxMin) / (pxMax - pxMin)) * (W - 2 * PAD); }
    function sy(pz) { return PAD + ((pzMax - pz) / (pzMax - pzMin)) * (H - 2 * PAD); }

    const zx = sx(szLeft), zy = sy(szTop);
    const zw = sx(szRight) - zx, zh = sy(szBot) - zy;
    const tw = zw / 3, th = zh / 3;

    const grid = [1,2].map(i => `
      <line x1="${(zx + tw*i).toFixed(1)}" y1="${zy.toFixed(1)}" x2="${(zx + tw*i).toFixed(1)}" y2="${(zy+zh).toFixed(1)}" stroke="var(--border)" stroke-width="0.8"/>
      <line x1="${zx.toFixed(1)}" y1="${(zy + th*i).toFixed(1)}" x2="${(zx+zw).toFixed(1)}" y2="${(zy + th*i).toFixed(1)}" stroke="var(--border)" stroke-width="0.8"/>`).join('');

    // Home plate (simple pentagon)
    const pcx = W / 2, pw = zw * 0.75, py = sy(0.15);
    const plate = `M ${(pcx-pw/2).toFixed(1)},${py.toFixed(1)} L ${(pcx+pw/2).toFixed(1)},${py.toFixed(1)} L ${(pcx+pw/2).toFixed(1)},${(py+5).toFixed(1)} L ${pcx.toFixed(1)},${(py+10).toFixed(1)} L ${(pcx-pw/2).toFixed(1)},${(py+5).toFixed(1)} Z`;

    const dots = pitches.map((p, i) => {
      const coords = p.pitchData?.coordinates;
      if (coords?.pX == null || coords?.pZ == null) return '';
      const cx = sx(coords.pX), cy = sy(coords.pZ);
      const code = p.details?.type?.code;
      const col  = pitchColor(code);
      const isBall   = p.details?.isBall;
      const isInPlay = p.details?.isInPlay;
      const speed    = p.pitchData?.startSpeed ? `${Math.round(p.pitchData.startSpeed)} mph` : '';
      const tip      = `${PITCH_SHORT[code] || code || ''} ${speed} — ${p.details?.description || ''}`.trim();
      const r = W < 180 ? 8 : 9;
      // Balls: hollow circle with colored stroke; strikes/in-play: solid fill
      const fill      = isBall ? 'none' : col;
      const fillOp    = isBall ? '0' : '0.88';
      const stroke    = isBall ? col : (isInPlay ? 'white' : 'rgba(0,0,0,0.25)');
      const sw        = isBall ? 2 : (isInPlay ? 1.5 : 0.8);
      const textFill  = isBall ? col : 'white';
      return `<g>
        <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${fill}" fill-opacity="${fillOp}" stroke="${stroke}" stroke-width="${sw}">
          <title>${tip}</title>
        </circle>
        <text x="${cx.toFixed(1)}" y="${(cy+3).toFixed(1)}" text-anchor="middle" font-size="7" font-weight="700" fill="${textFill}" pointer-events="none">${i+1}</text>
      </g>`;
    }).join('');

    const sy0 = sy(0);
    const batter = buildBatterSilhouette(pcx, sy0, pw, W, H, batSide);

    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
        style="background:var(--surface2);border-radius:8px;border:1px solid var(--border);display:block">
      <path d="${plate}" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <rect x="${zx.toFixed(1)}" y="${zy.toFixed(1)}" width="${zw.toFixed(1)}" height="${zh.toFixed(1)}"
        fill="rgba(31,111,235,0.06)" stroke="var(--accent)" stroke-width="1.5" rx="2"/>
      ${grid}
      ${batter}
      ${dots}
    </svg>`;
  }

  function buildAtBat(play, num) {
    const result  = play.result;
    const about   = play.about;
    const matchup = play.matchup;
    const pitches = (play.playEvents || []).filter(e => e.type === 'pitch');

    const inningStr = `${about.halfInning === 'top' ? 'Top' : 'Bot'} ${about.inning}`;
    const pitcher   = matchup?.pitcher?.fullName || '';
    const eventType = result?.eventType || '';

    const positive = ['single','double','triple','home_run','walk','intent_walk','hit_by_pitch','sac_fly','sac_bunt'];
    const negative = ['strikeout','double_play','grounded_into_double_play','triple_play'];
    const cls = positive.includes(eventType) ? 'positive' : negative.includes(eventType) ? 'negative' : 'neutral';

    const chips = pitches.map((p, i) => {
      const code  = p.details?.type?.code || '?';
      const speed = p.pitchData?.startSpeed ? ` ${Math.round(p.pitchData.startSpeed)}` : '';
      const type  = p.details?.isInPlay ? 'inplay' : p.details?.isStrike ? 'strike' : 'ball';
      const tip   = `${i+1}. ${PITCH_SHORT[code] || code}${speed ? speed+' mph' : ''} — ${p.details?.description || ''}`;
      return `<span class="pitch-chip ${type}" title="${tip}">${i+1}. ${code}${speed}</span>`;
    }).join('');

    const batSide = matchup?.batSide?.code || null;
    const hasPitchCoords = pitches.some(p => p.pitchData?.coordinates?.pX != null);
    const zoneHtml = hasPitchCoords
      ? `<div style="flex-shrink:0">${buildStrikeZone(pitches, 160, 190, batSide)}</div>`
      : '';

    return `<div class="at-bat-item">
      <div class="at-bat-header">
        <span class="at-bat-result ${cls}">${num}. ${result?.event || 'Unknown'}</span>
        <span class="at-bat-context">${inningStr}</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">vs ${pitcher} · ${pitches.length} pitch${pitches.length !== 1 ? 'es' : ''}</div>
      <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
        ${zoneHtml}
        <div class="at-bat-pitches" style="align-content:flex-start">${chips || '<span style="font-size:11px;color:var(--muted)">No pitch data</span>'}</div>
      </div>
    </div>`;
  }

  function closePlayerView() {
    document.getElementById('player-overlay').classList.remove('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Close on overlay click (outside modal)
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('player-overlay').classList.contains('open')) {
        closePlayerView(); return;
      }
      closeModal();
    }
    if (document.getElementById('modal-overlay').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // Close player overlay on background click
  document.getElementById('player-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('player-overlay')) closePlayerView();
  });

  // ── Schedule loader ────────────────────────────────────────

  async function loadGames(dateStr) {
    const grid       = document.getElementById('games-grid');
    const summaryBar = document.getElementById('summary-bar');
    const refreshInfo= document.getElementById('refresh-info');

    document.getElementById('date-display').textContent = formatDisplayDate(dateStr);

    try {
      const url = `${BASE}/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore,probablePitcher,team`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const dates = data.dates || [];
      const games = dates.length > 0 ? dates[0].games : [];

      scheduleCache = {};
      games.forEach(g => scheduleCache[g.gamePk] = g);

      if (games.length === 0) {
        grid.innerHTML = `<div class="no-games">No games scheduled for this date.</div>`;
        summaryBar.innerHTML = '';
        hasLiveGames = false;
        scheduleRefresh(false);
        return;
      }

      hasLiveGames = games.some(g => g.status.abstractGameState === 'Live');
      const liveCount    = games.filter(g => g.status.abstractGameState === 'Live').length;
      const finalCount   = games.filter(g => g.status.abstractGameState === 'Final').length;
      const previewCount = games.filter(g => g.status.abstractGameState === 'Preview').length;

      summaryBar.innerHTML = `
        <span><strong>${games.length}</strong> games</span>
        ${liveCount    ? `<span><strong>${liveCount}</strong> live</span>`     : ''}
        ${finalCount   ? `<span><strong>${finalCount}</strong> final</span>`   : ''}
        ${previewCount ? `<span><strong>${previewCount}</strong> upcoming</span>` : ''}`;

      refreshInfo.innerHTML = hasLiveGames
        ? `<span class="live-dot"></span> Auto-refreshing` : '';

      const order = {Live: 0, Preview: 1, Final: 2};
      const sorted = [...games].sort((a, b) =>
        (order[a.status.abstractGameState] ?? 1) - (order[b.status.abstractGameState] ?? 1));
      grid.innerHTML = sorted.map(renderGame).join('');
      scheduleRefresh(hasLiveGames);
    } catch (err) {
      grid.innerHTML = `<div class="error-msg">Failed to load games.<br><small>${err.message}</small></div>`;
      scheduleRefresh(false);
    }
  }

  function scheduleRefresh(live) {
    if (refreshTimer) clearTimeout(refreshTimer);
    if (live) refreshTimer = setTimeout(() => loadGames(toDateStr(currentDate)), 30000);
  }

  function navigate(delta) {
    if (refreshTimer) clearTimeout(refreshTimer);
    currentDate.setDate(currentDate.getDate() + delta);
    document.getElementById('games-grid').innerHTML =
      '<div class="loading"><div class="spinner"></div> Loading games…</div>';
    loadGames(toDateStr(currentDate));
  }

  document.getElementById('prev-day').addEventListener('click', () => navigate(-1));
  document.getElementById('next-day').addEventListener('click', () => navigate(1));

  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.getElementById('theme-toggle').textContent = dark ? '☀️' : '🌙';
  }

  function toggleTheme() {
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  }

  applyTheme(localStorage.getItem('theme') === 'dark');

  loadGames(toDateStr(currentDate));
</script>
</body>
